  <body>
    <div id="root"></div>
    <script>
      // Decode the path redirect from 404.html back into the real URL.
      (function(l) {
        if (l.search[1] === 'p') {
          var params = l.search.slice(1).split('&').reduce(function(p, s) {
            var r = s.split('=');
            p[r[0]] = r.slice(1).join('=').replace(/~and~/g, '&');
            return p;
          }, {});
          window.history.replaceState(
            null, null,
            l.pathname + (params.p ? '/' + params.p : '') +
            (params.q ? '?' + params.q : '') +
            l.hash
          );
        }
      }(window.location));
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
