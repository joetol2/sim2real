<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sim2Real</title>
    <script>
      // Redirect all 404s back to index.html so React Router can handle the path.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?p=' + l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
